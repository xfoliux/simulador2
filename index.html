<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <title>Sistema de Créditos</title>
  </head>

    <body>

      <header>
        <h1>Sistema Básico de Créditos</h1>
        <link rel="stylesheet" href="simulador_completo.css">
      </header>

      <nav>

        <button onclick="mostrarSeccion('parametros');">Parámetros</button>
        <button onclick="mostrarSeccion('clientes');">Clientes</button>
        <button onclick="mostrarSeccion('creditos')">Créditos</button>
        <button onclick="mostrarSeccion('historial')">Créditos Registrados</button>
      </nav>

      <section id="parametros"> <!--class="activa"-->
        <h2>Configurar Parámetros</h2>

        <label>Tasa de interés:</label>
        <input type="number" id="tasaInteres" min="10" max="20" value="15">
        <span>%</span>

        <br>
        <button onclick="guardarTasa()">Guardar tasa</button>

        <p id="mensajeTasa"></p>
      </section>

      <section id="clientes"> <!--class="activa"-->
        <h2>Registro de Clientes</h2>

        <input type="text" id="cedula" placeholder="Cédula">
        <input type="text" id="nombre" placeholder="Nombres">
        <input type="text" id="apellido" placeholder="Apellido">
        <input type="number" id="ingresos" placeholder="Ingresos">
        <input type="number" id="egresos" placeholder="Egresos">

        <br>

        <button onclick="guardarCliente()">Guardar cliente</button>
        <button onclick="limpiarFormulario()">Limpiar</button>
        <table>
          <thead>
            <tr>
              <th>Cédula</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Ingresos</th>
              <th>Egresos</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaClientes"></tbody>

        </table>
      </section>
      <section id="creditos">
        <h2>Solicitar Crédito</h2>

        <input type="text" id="buscarCedulaCredito" placeholder="Ingrese Cédula">
        <button onclick="buscarClienteCredito()">Buscar cliente</button>

        <div id="datosClienteCredito" class="card"></div>

        <input type="number" id="montoCredito" placeholder="Monto">
        <input type="number" id="plazoCredito" placeholder = "Plazo (meses)">

        <br></br>

        <button onclick="calcularCredito()">Calcular crédito</button>

        <div id="resultadoCredito"></div>

        <button id="btnAsignarCredito" onclick="asignarCredito()" disabled>
          Asignar Crédito Solicitar
        </button>
        </section>
        <section id="historial">
        <h2> Créditos Registrados </h2>

        <input type="text"
              id="buscarCedulaHistorial"
              placeholder="Ingrese cédula">

        <button onclick="buscarCreditosCliente()">
          Buscar Créditos
        </button>

        <button onclick="pintarCreditos(creditos)">
          Mostrar Todos
        </button>

        <table>
          <thead>
            <tr>
              <th>Cédula</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Monto</th>
              <th>Tasa</th>
              <th>Plazo</th>
              <th>Cuota</th>
            </tr>
          </thead>

          <tbody id="tablaCreditos"></tbody>

        </table>
      </section>
      <script src="utilitarios.js"></script>
      <script src="simulador_completo.js"></script>

    </body>

</html>
